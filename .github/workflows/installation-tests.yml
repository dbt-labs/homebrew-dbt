# **what?**
# This workflow installs each dbt formula published by this tap from Homebrew
# and runs 'dbt --version' to verify the installation was successful.
# If it fails for the scheduled runs, it will post to our team alerts channel.

# **why?**
# This is a simple way to test all formula installations at a single
# time. It allows us to test them on a schedule as well to check for
# any breaking changes that might happen and alert us on it.

# **when?**
# This workflow will run on a schedule every night and also can be
# manually invoked.

name: Homebrew installation testing

on:
  workflow_dispatch:

  # run this a few times per day to ensure no regressions
  schedule:
    - cron: "0 9,13,18 * * *" # 9:00, 13:00, 18:00 UTC

# no permissions are needed for this workflow
permissions: {}

jobs:
  homebrew:
    strategy:
      fail-fast: false
      matrix:
        # dbt-core (open source) and dbt (proprietary) both install the `dbt`
        # binary and conflict, so each is installed in its own job.
        formula: ['dbt-core', 'dbt']
        # macos-latest = Apple Silicon (arm64), macos-13 = Intel (x86_64),
        # ubuntu-latest = Linux x86_64, ubuntu-24.04-arm = Linux arm64.
        os: ['macos-latest', 'macos-13', 'ubuntu-latest', 'ubuntu-24.04-arm']

    runs-on: ${{ matrix.os }}

    steps:

      - name: "Prepare Brew"
        # brew upgrade generates some symlink update warnings that cause failures without the || true.
        # They're just that the symlink wasn't updated which is okay to ignore.
        # This does cause other errors to be ignored but for this case that's safe since the brew install
        # step would likely fail at that point.
        run: |
          brew update
          brew upgrade || true

      - name: "Brew Tap"
        run: |
          brew tap dbt-labs/dbt

      - name: "Brew install ${{ matrix.formula }}"
        run: |
          brew install --verbose dbt-labs/dbt/${{ matrix.formula }}

      - name: "Verify ${{ matrix.formula }} version"
        run: |
          dbt --version

  post-failure:
    runs-on: ubuntu-latest
    needs: homebrew
    if: ${{ failure() }}

    steps:
      - name: Posting scheduled run failures
        uses: ravsamhq/notify-slack-action@v2
        if: ${{ github.event_name == 'schedule' }}
        with:
          notification_title: "Homebrew nightly integration test failed"
          status: ${{ job.status }}
    env:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_DEV_CORE_ALERTS }}
